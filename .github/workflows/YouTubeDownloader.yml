name: 🎯 YouTubeDownloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: "🎬 YouTube Video URL"
        required: true
        type: string
      type:
        description: "📦 Output Type"
        required: true
        type: choice
        options:
          - video
          - audio
        default: video
      quality:
        description: "🎚️ Quality (video: 144p/360p/480p/720p/1080p | audio: 64kbps/128kbps/192kbps/320kbps)"
        required: false
        type: string
        default: 720p
      split_threshold_mb:
        description: "📦 Split files larger than (MB) — 0 = never"
        required: false
        type: number
        default: 90

permissions:
  contents: read

jobs:
  download-and-process:
    name: 🚀 Download & Process YouTube Content
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🔧 Install Dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zip curl jq python3 python3-pip
          python3 -m pip install -q requests

      - name: 🎯 Request Conversion via API
        id: converter
        shell: bash
        env:
          YT_URL: ${{ github.event.inputs.url }}
          OUTPUT_TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          set -euo pipefail
          python3 << 'PYEOF'
          import os, sys, json, time, re
          import requests

          YT_URL = os.environ["YT_URL"].strip()
          OUTPUT_TYPE = os.environ["OUTPUT_TYPE"].strip().lower()
          QUALITY_INPUT = os.environ.get("QUALITY", "720p").strip()

          API_ENDPOINT = "https://hub.ytconvert.org/api/download"
          STATUS_CHECK_INTERVAL = 2
          MAX_ATTEMPTS = 90

          VIDEO_QUALITIES = ["144p", "360p", "480p", "720p", "1080p"]
          AUDIO_KBPS = [64, 128, 192, 320]

          def normalize_video_quality(q: str) -> str:
              q = q.lower().strip().replace(" ", "")
              aliases = {"4k":"1080p", "2160p":"1080p", "1440p":"1080p", "2k":"1080p", "240p":"360p"}
              if q in aliases:
                  return aliases[q]
              if not q.endswith("p"):
                  q += "p"
              if q in VIDEO_QUALITIES:
                  return q
              nums = [int(x.replace("p","")) for x in VIDEO_QUALITIES]
              n = int("".join(ch for ch in q if ch.isdigit()) or "720")
              closest = min(nums, key=lambda x: abs(x - n))
              return f"{closest}p"

          def normalize_audio_quality(q: str):
              q = q.lower().strip().replace(" ", "")
              # normalize user input to kbps label for display
              if q.endswith("k"):
                  q = q[:-1] + "kbps"
              if not q.endswith("kbps"):
                  digits = "".join(ch for ch in q if ch.isdigit())
                  q = (digits if digits else "192") + "kbps"

              # parse numeric
              try:
                  n = int("".join(ch for ch in q if ch.isdigit()))
              except ValueError:
                  n = 192

              closest = min(AUDIO_KBPS, key=lambda x: abs(x - n))
              display_quality = f"{closest}kbps"   # for filename/log
              api_bitrate = f"{closest}k"          # REQUIRED by API
              return display_quality, api_bitrate

          if OUTPUT_TYPE not in ("audio", "video"):
              print(f"❌ Invalid output type: {OUTPUT_TYPE}")
              sys.exit(1)

          if OUTPUT_TYPE == "audio":
              quality_label, api_bitrate = normalize_audio_quality(QUALITY_INPUT)
              payload = {
                  "url": YT_URL,
                  "os": "linux",
                  "output": {"type": "audio", "format": "mp3"},
                  "audio": {"bitrate": api_bitrate}
              }
          else:
              quality_label = normalize_video_quality(QUALITY_INPUT)
              payload = {
                  "url": YT_URL,
                  "os": "linux",
                  "output": {"type": "video", "format": "mp4", "quality": quality_label}
              }

          print(f"🎯 Target: {OUTPUT_TYPE.upper()} @ {quality_label}")
          print("=" * 50)
          print(f"📤 Requesting conversion for: {YT_URL}")
          print(f"📋 Final payload: {json.dumps(payload, indent=2)}")

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg",
          }

          session = requests.Session()
          session.get("https://media.ytmp3.gg/", headers=HEADERS, timeout=20)

          def create_job(req_payload):
              r = session.post(API_ENDPOINT, json=req_payload, headers=HEADERS, timeout=30)
              if r.status_code != 200:
                  return None, r
              return r.json(), r

          data, resp = create_job(payload)

          if data is None:
              print(f"❌ API Error ({resp.status_code}): {resp.text[:300]}")
              # strict fallback
              if resp.status_code == 400 and OUTPUT_TYPE == "audio":
                  print("🔄 Retrying with fallback bitrate: 192k")
                  payload["audio"]["bitrate"] = "192k"
                  quality_label = "192kbps"
                  data, resp = create_job(payload)
              elif resp.status_code == 400 and OUTPUT_TYPE == "video":
                  print("🔄 Retrying with fallback quality: 720p")
                  payload["output"]["quality"] = "720p"
                  quality_label = "720p"
                  data, resp = create_job(payload)

          if data is None:
              print(f"❌ Request failed after fallback ({resp.status_code}): {resp.text[:300]}")
              sys.exit(1)

          status_url = data.get("statusUrl")
          title = data.get("title", "youtube_video")

          if not status_url:
              print("❌ API response missing statusUrl")
              print(json.dumps(data, indent=2))
              sys.exit(1)

          print(f"✅ Conversion registered: {title}")
          print("=" * 50)

          download_url = None
          for attempt in range(1, MAX_ATTEMPTS + 1):
              time.sleep(STATUS_CHECK_INTERVAL)
              try:
                  sr = session.get(status_url, headers=HEADERS, timeout=15)
                  sd = sr.json()
              except Exception as e:
                  print(f"⚠️ Status check failed [{attempt}/{MAX_ATTEMPTS}]: {e}")
                  continue

              status = sd.get("status")
              progress = sd.get("progress", 0)
              print(f"🔄 Status [{attempt}/{MAX_ATTEMPTS}] => {status} ({progress}%)")

              if status == "completed":
                  download_url = sd.get("downloadUrl")
                  if download_url:
                      print("🎉 Conversion completed!")
                      break
              elif status == "failed":
                  print(f"❌ Conversion failed: {sd.get('error', 'Unknown error')}")
                  sys.exit(1)

          if not download_url:
              print("⏰ Timeout waiting for conversion completion")
              sys.exit(1)

          vid_match = re.search(r"(?:v=|/)([a-zA-Z0-9_-]{11})", YT_URL)
          video_id = vid_match.group(1) if vid_match else "unknown"

          safe_title = re.sub(r"[^a-zA-Z0-9\\-_]", "_", title.replace(" ", "_")).strip("_")
          safe_title = safe_title[:60] if safe_title else video_id

          ext = "mp3" if OUTPUT_TYPE == "audio" else "mp4"
          filename = f"{safe_title}_{video_id}_{quality_label}.{ext}"

          with open("/tmp/metadata.txt", "w", encoding="utf-8") as f:
              f.write(download_url + "\n")
              f.write(filename + "\n")
              f.write(safe_title + "\n")
              f.write(OUTPUT_TYPE + "\n")
              f.write(quality_label + "\n")

          print("=" * 50)
          print(f"📥 Download URL: {download_url[:80]}...")
          print(f"📄 Filename: {filename}")
          print(f"🎵 Type: {OUTPUT_TYPE} | Quality: {quality_label}")
          print("=" * 50)
          PYEOF

      - name: ⬇️ Download Converted File
        shell: bash
        run: |
          set -euo pipefail
          DOWNLOAD_URL="$(sed -n '1p' /tmp/metadata.txt)"
          FILENAME="$(sed -n '2p' /tmp/metadata.txt)"
          OUTPUT_TYPE="$(sed -n '4p' /tmp/metadata.txt)"
          QUALITY="$(sed -n '5p' /tmp/metadata.txt)"

          mkdir -p ./downloads/temp

          echo "⬇️ Downloading $OUTPUT_TYPE @ $QUALITY..."
          echo "📄 File: $FILENAME"

          curl --fail --show-error --progress-bar \
            -L \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0" \
            -H "Referer: https://media.ytmp3.gg/" \
            -o "./downloads/temp/$FILENAME" \
            --max-time 300 \
            --retry 3 \
            --retry-delay 5 \
            "$DOWNLOAD_URL"

          if [ ! -s "./downloads/temp/$FILENAME" ]; then
            echo "❌ Download failed or empty file!"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s "./downloads/temp/$FILENAME")
          FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Downloaded: $FILENAME"
          echo "📏 Size: ${FILE_SIZE_MB} MB"
          echo "🎚️ Quality: $QUALITY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ✂️ Smart Split Large Files
        shell: bash
        run: |
          set -euo pipefail

          THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          THRESHOLD_MB="${THRESHOLD_MB:-90}"

          # sanitize numeric
          if ! [[ "$THRESHOLD_MB" =~ ^[0-9]+$ ]]; then
            echo "⚠️ Invalid split_threshold_mb: $THRESHOLD_MB, using 90"
            THRESHOLD_MB=90
          fi

          THRESHOLD_BYTES=$((THRESHOLD_MB * 1024 * 1024))
          mkdir -p ./downloads

          shopt -s nullglob
          files=(./downloads/temp/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "❌ No files found in ./downloads/temp"
            exit 1
          fi

          for file in "${files[@]}"; do
            [ -f "$file" ] || continue
            size=$(stat -c%s "$file")
            basename=$(basename "$file")
            size_mb=$((size / 1024 / 1024))

            if [[ "$THRESHOLD_BYTES" -gt 0 && "$size" -gt "$THRESHOLD_BYTES" ]]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "✂️ Splitting $basename (${size_mb}MB)"
              echo "   Parts size: ${THRESHOLD_MB}MB each"

              (
                cd ./downloads
                zip -r -s "${THRESHOLD_MB}m" "${basename}.zip" "temp/${basename}"
              )

              parts_count=$(ls ./downloads/"${basename}".z* 2>/dev/null | wc -l || true)
              echo "✅ Created $parts_count parts"
              rm -f "$file"
            else
              if [[ "$THRESHOLD_BYTES" -eq 0 ]]; then
                echo "📁 $basename (${size_mb}MB) — split disabled"
              else
                echo "📁 $basename (${size_mb}MB) — under threshold"
              fi
              mv "$file" "./downloads/$basename"
            fi
          done

          rm -rf ./downloads/temp

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📂 Final files in ./downloads/:"
          ls -lh ./downloads/ | tail -n +2 | awk '{print "  • " $NF " (" $5 ")"}'
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 📦 Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download-${{ github.run_id }}
          path: downloads/
          if-no-files-found: error
          retention-days: 7
